services:
  app:
    container_name: latex-app
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_URL=${POSTGRES_URL:-}
      - POSTGRES_URL_NON_POOLING=${POSTGRES_URL_NON_POOLING:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-blob}
      - BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}
      - PREVIEW_WORKER_WEBHOOK_URL=${PREVIEW_WORKER_WEBHOOK_URL:-}
      - PREVIEW_WORKER_WEBHOOK_SECRET=${PREVIEW_WORKER_WEBHOOK_SECRET:-}
      - PREVIEW_WORKER_INGEST_SECRET=${PREVIEW_WORKER_INGEST_SECRET:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - UPLOAD_INIT_RATE_LIMIT_PER_MINUTE=${UPLOAD_INIT_RATE_LIMIT_PER_MINUTE:-30}
      - UPLOAD_PART_RATE_LIMIT_PER_MINUTE=${UPLOAD_PART_RATE_LIMIT_PER_MINUTE:-360}
      - UPLOAD_PART_PER_SESSION_RATE_LIMIT_PER_MINUTE=${UPLOAD_PART_PER_SESSION_RATE_LIMIT_PER_MINUTE:-480}
      - UPLOAD_COMPLETE_RATE_LIMIT_PER_MINUTE=${UPLOAD_COMPLETE_RATE_LIMIT_PER_MINUTE:-30}
      - PUBLIC_SHARE_RATE_LIMIT_PER_MINUTE=${PUBLIC_SHARE_RATE_LIMIT_PER_MINUTE:-240}
      - PUBLIC_SHARE_CACHE_SECONDS=${PUBLIC_SHARE_CACHE_SECONDS:-15}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - PASSWORD_RESET_TOKEN_TTL_MINUTES=${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
  db:
    container_name: latex-db
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=latex
      - POSTGRES_USER=latex
      - POSTGRES_PASSWORD=latex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U latex -d latex"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - latex_db:/var/lib/postgresql/data

volumes:
  latex_db:
